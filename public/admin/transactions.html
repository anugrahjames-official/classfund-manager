<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View and filter all class fund transactions">
    <link rel="stylesheet" href="../styles/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Transactions - Class Fund Manager</title>
    <style>
        /* ── Page Header ── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: white;
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: #f1f5f9;
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ── Search & Filter Bar ── */
        .search-filter-bar {
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: flex-end;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .filter-group label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
        }
        .search-input-group {
            flex: 1;
            min-width: 200px;
        }
        .search-input {
            position: relative;
            width: 100%;
        }
        .search-input input {
            width: 100%;
            padding: 0.6rem 0.75rem 0.6rem 2.25rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.875rem;
            color: var(--text-main);
            background: #f8fafc;
            transition: border-color 0.2s, background 0.2s;
        }
        .search-input input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }
        .search-input input::placeholder {
            color: #94a3b8;
        }
        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: #94a3b8;
            pointer-events: none;
        }
        .filter-select,
        .filter-date {
            padding: 0.6rem 0.75rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.875rem;
            color: var(--text-main);
            background: #f8fafc;
            cursor: pointer;
            transition: border-color 0.2s;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .filter-select:focus,
        .filter-date:focus {
            outline: none;
            border-color: var(--primary);
        }
        .clear-filters-btn {
            padding: 0.6rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: white;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .clear-filters-btn:hover {
            background: #fef2f2;
            color: var(--danger);
            border-color: var(--danger);
        }

        /* ── Results Summary ── */
        .results-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding: 0 0.25rem;
        }
        .results-count {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .results-count strong {
            color: var(--text-main);
        }
        .total-amount-badge {
            background: linear-gradient(135deg, #eef2ff, #e0e7ff);
            color: var(--primary);
            padding: 0.35rem 0.85rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        /* ── Table Enhancements ── */
        .table-container {
            border-radius: 12px;
            overflow: hidden;
        }
        table th {
            position: sticky;
            top: 0;
            z-index: 2;
        }
        td {
            font-size: 0.9rem;
        }
        tr {
            transition: background 0.15s;
        }
        tbody tr:hover {
            background: #f8fafc;
        }

        /* ── Status Badges ── */
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }
        .status-completed {
            background: #dcfce7;
            color: #166534;
        }
        .status-pending {
            background: #fef9c3;
            color: #854d0e;
        }
        .status-failed {
            background: #fee2e2;
            color: #991b1b;
        }
        .status-refunded {
            background: #e0e7ff;
            color: #3730a3;
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--text-muted);
        }
        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            opacity: 0.4;
        }
        .empty-state p {
            font-size: 0.9rem;
        }

        /* ── Loading Skeleton ── */
        .skeleton-row td {
            position: relative;
            overflow: hidden;
        }
        .skeleton-bar {
            height: 14px;
            border-radius: 6px;
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .search-filter-bar {
                flex-direction: column;
                gap: 0.75rem;
            }
            .search-input-group { min-width: 100%; }
            .filter-group { width: 100%; }
            .filter-select,
            .filter-date { width: 100%; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="page-header">
            <h1>All Transactions</h1>
            <a href="adminDashboard.html" class="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
                Dashboard
            </a>
        </div>

        <!-- Search & Filters -->
        <div class="search-filter-bar" id="search-filter-bar">
            <div class="filter-group search-input-group">
                <label for="search-roll">Search</label>
                <div class="search-input">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="search-roll" placeholder="Roll No or Amount...">
                </div>
            </div>

            <div class="filter-group">
                <label for="filter-status">Status</label>
                <select id="filter-status" class="filter-select">
                    <option value="all">All Statuses</option>
                    <option value="completed">Completed</option>
                    <option value="pending">Pending</option>
                    <option value="failed">Failed</option>
                    <option value="refunded">Refunded</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filter-date-from">From</label>
                <input type="date" id="filter-date-from" class="filter-date">
            </div>

            <div class="filter-group">
                <label for="filter-date-to">To</label>
                <input type="date" id="filter-date-to" class="filter-date">
            </div>

            <button id="clear-filters-btn" class="clear-filters-btn">Clear Filters</button>
        </div>

        <!-- Results Summary -->
        <div class="results-summary">
            <span class="results-count" id="results-count">Loading...</span>
            <span class="total-amount-badge" id="total-amount-badge">₹0</span>
        </div>

        <!-- Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Roll No</th>
                        <th>Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="class-fund-table2">
                    <!-- Skeleton loading rows -->
                    <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:80px"></div></td><td><div class="skeleton-bar" style="width:40px"></div></td><td><div class="skeleton-bar" style="width:50px"></div></td><td><div class="skeleton-bar" style="width:70px"></div></td></tr>
                    <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:80px"></div></td><td><div class="skeleton-bar" style="width:40px"></div></td><td><div class="skeleton-bar" style="width:50px"></div></td><td><div class="skeleton-bar" style="width:70px"></div></td></tr>
                    <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:80px"></div></td><td><div class="skeleton-bar" style="width:40px"></div></td><td><div class="skeleton-bar" style="width:50px"></div></td><td><div class="skeleton-bar" style="width:70px"></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>


    <script src="scripts/transactions.js" type="module"></script>
</body>
</html>
