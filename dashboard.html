<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE - B </title>
    <link href="styles/style.css" rel="stylesheet">
</head>

<body>

    <nav class="nav">
        <div id="header-name">CSE - B </div>
        <button id="logout-btn" class="logout-btn">Logout</button>
    </nav>
   <button class="pay-btn" onclick="openPayModal()">Pay</button>
   

    <section id="home-page" class="dashboard">
        <div class="dashboard-header">
            <h1>Class Dashboard</h1>
            <p class="welcome">Welcome,<span id="user-name">Student</span></p>
        </div>
        <div class="cards-grid">
            <div class="card" onclick="navigateToClassFund()">
                <h3>Class Fund</h3>
                <p>Balance <span id="total-balance">500</span> </p>
                <small>View All expenses</small>

            </div>
            <div class="card">
                <h3>My payments</h3>
                <p>Total Paid: <span id="user-total">100</span></p>
                <small>View All payments</small>
            </div>

        </div>
    </section>
    <section id="class-fund-page" class="container hidden">
        <div class="back-btn" onclick="navigateToHome()">← Back to Dashboard</div>
        <h1>Class Fund Transactions</h1>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody id="class-fund-table">

                </tbody>
            </table>
        </div>
    </section>
    <script>
        function navigateToHome() {
            console.log("clicked");
            document.getElementById("class-fund-page").classList.toggle("hidden");
            document.getElementById("home-page").classList.toggle("hidden");
        }
        function navigateToClassFund() {
            document.getElementById("home-page").classList.toggle("hidden");
            document.getElementById("class-fund-page").classList.toggle("hidden");
        }
        function openPayModal() {
            document.getElementById('pay-modal').classList.remove('hidden');
            document.getElementById('pay-amount').value = '';
            document.getElementById('pay-amount').focus();
        }

        function closePayModal() {
            document.getElementById('pay-modal').classList.add('hidden');
        }
    </script>

</body>

</html>
