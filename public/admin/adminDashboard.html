<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - CSE-B Class Fund</title>
    <link href="../styles/admin.css" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>Admin Dashboard</h1>
            <a href="transactions.html"> 
                <button onclick="location.reload()" style="background: none; border: 1px solid var(--border); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer;">transactions</button>
            </a>
        </header>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Students</h3>
                <p id="total-students">63</p>
            </div>
            <div class="stat-card">
                <h3>Total Expenses</h3>
                <p id="total-expenses" class="expense-text">₹0</p>
            </div>
            <div class="stat-card">
                <h3>Net Balance</h3>
                <p id="total-balance">₹0</p>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-header">
                <div class="input-group">
                    <label for="min-amount">Set Min Amount:</label>
                    <input type="number" id="min-amount" value="0">
                    <button id="filter-btn" class="fetch">fetch</button>
                </div>
                <div id="defaulter-count" class="count-badge"><span id="count-below">0</span> Students below target</div>
            </div>
            <p style="color: var(--text-muted); font-size: 0.875rem;">Showing list of students who have paid less than the required amount.</p>
        </div>

        <div class="table-container">
            <table>
             <thead>
                    <tr>
                        <th>Roll No</th>
                        <th>Student Name</th>
                        <th>Amount Paid</th>
                        <th>Gap</th>
                    </tr>
                </thead>   
                <tbody id="student-table"></tbody>
            </table>
        </div>
    </div>

    <script src="scripts/adminDashboard.js" type="module">
       
        
    </script>
</body>
</html>
